name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Syntax check
        run: python -m py_compile check_en_fr_templates.py

      - name: CLI smoke check (no scan)
        run: python check_en_fr_templates.py --help > /dev/null
